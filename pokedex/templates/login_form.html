{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-6">

        <h2 class="mt-4 mb-4">
            Iniciar Sesión
        </h2>

        <form method="POST">

            {% csrf_token %}

            <label for="username">
                Usuario
            </label>

            <input
                type="text"
                name="username"
                id="username"
                class="form-control"
            >

            <label for="password" class="mt-3">
                Contraseña
            </label>

            <input
                type="password"
                name="password"
                id="password"
                class="form-control"
            >

            <button
                type="submit"
                class="btn btn-success mt-3"
            >
                Ingresar
            </button>

        </form>

    </div>

</div>

{% endblock %}
